<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxelane BD</title>

<style>
:root{
  --bg:#070707;
  --card:#111;
  --accent:#00f5ff;
  --text:#fff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui;
}

body{
  background:var(--bg);
  color:var(--text);
}

/* NAVBAR */
.navbar{
  position:fixed;
  width:100%;
  top:0;
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  z-index:1000;
}

.logo{
  font-weight:bold;
  color:var(--accent);
}

.cart-btn{
  cursor:pointer;
}

/* HERO */
.hero{
  height:90vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:48px;
  color:var(--accent);
}

/* PRODUCTS */
.container{
  padding:100px 20px;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.product{
  background:var(--card);
  padding:15px;
  border-radius:15px;
  transition:.3s;
}

.product:hover{
  transform:translateY(-8px);
  box-shadow:0 0 15px #00f5ff33;
}

.product img{
  width:100%;
  border-radius:10px;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  background:var(--accent);
  cursor:pointer;
}

/* CART DRAWER */
.cart{
  position:fixed;
  right:-400px;
  top:0;
  width:350px;
  height:100%;
  background:#111;
  padding:20px;
  transition:.3s;
}

.cart.active{right:0;}

.cart-item{
  display:flex;
  justify-content:space-between;
  margin:10px 0;
}

/* CHECKOUT */
.checkout{
  padding:30px;
}

input,textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  background:#222;
  border:none;
  color:white;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#000;
  padding:10px 20px;
  border-radius:20px;
  display:none;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  background:#000;
}

/* MOBILE */
@media(max-width:600px){
  .hero h1{font-size:28px;}
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">Luxelane BD</div>
  <div class="cart-btn" onclick="toggleCart()">🛒 <span id="count">0</span></div>
</div>

<div class="hero">
  <h1>Luxury That Defines You</h1>
</div>

<div class="container">
  <div class="products" id="products"></div>
</div>

<!-- CART -->
<div class="cart" id="cart">
  <h2>Your Cart</h2>
  <div id="cartItems"></div>

  <input id="coupon" placeholder="Coupon Code">
  <button onclick="applyCoupon()">Apply Coupon</button>

  <h3>Total: ৳<span id="total">0</span></h3>
  <button onclick="checkout()">Checkout via WhatsApp</button>
</div>

<!-- TOAST -->
<div class="toast" id="toast">Added to cart</div>

<footer>© Luxelane BD</footer>

<script>
let phone="8801XXXXXXXXX";

let products=[
{id:1,name:"Luxury Panjabi",price:1500,img:"https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf"},
{id:2,name:"Hoodie",price:2000,img:"https://images.unsplash.com/photo-1520975922323-4506c66a7df2"},
{id:3,name:"Shirt",price:1200,img:"https://images.unsplash.com/photo-1521336575822-6da63fb45455"},
{id:4,name:"Jacket",price:2500,img:"https://images.unsplash.com/photo-1495107334309-fcf20504a5ab"},
{id:5,name:"T-Shirt",price:800,img:"https://images.unsplash.com/photo-1512436991641-6745cdb1723f"},
{id:6,name:"Blazer",price:3500,img:"https://images.unsplash.com/photo-1593032465175-481ac7f401a0"}
];

let cart=JSON.parse(localStorage.getItem("cart"))||[];
let discount=0;

function render(){
  let html="";
  products.forEach(p=>{
    html+=`
    <div class="product">
      <img src="${p.img}">
      <h3>${p.name}</h3>
      <p>৳${p.price}</p>
      <button onclick="add(${p.id})">Add to Cart</button>
    </div>`;
  });
  document.getElementById("products").innerHTML=html;
}

function add(id){
  let item=cart.find(i=>i.id===id);
  if(item) item.qty++;
  else cart.push({...products.find(p=>p.id===id),qty:1});
  update();
  showToast();
}

function update(){
  let html="",total=0,count=0;
  cart.forEach((i,index)=>{
    total+=i.price*i.qty;
    count+=i.qty;
    html+=`
    <div class="cart-item">
      ${i.name} x${i.qty}
      <span onclick="remove(${index})">❌</span>
    </div>`;
  });

  total-=discount;

  document.getElementById("cartItems").innerHTML=html;
  document.getElementById("total").innerText=total;
  document.getElementById("count").innerText=count;
  localStorage.setItem("cart",JSON.stringify(cart));
}

function remove(i){
  cart.splice(i,1);
  update();
}

function toggleCart(){
  document.getElementById("cart").classList.toggle("active");
}

function showToast(){
  let t=document.getElementById("toast");
  t.style.display="block";
  setTimeout(()=>t.style.display="none",2000);
}

function applyCoupon(){
  let code=document.getElementById("coupon").value;
  if(code==="LUXE10"){
    discount=100;
    alert("Coupon Applied!");
  }else{
    alert("Invalid Code");
  }
  update();
}

function checkout(){
  let message="Order Details:%0A";
  cart.forEach(i=>{
    message+=`${i.name} x${i.qty} = ৳${i.price*i.qty}%0A`;
  });
  message+=`Total: ৳${document.getElementById("total").innerText}`;
  
  window.open(`https://wa.me/${phone}?text=${message}`);
}

render();
update();
</script>

</body>
</html>
