<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxelane BD</title>

<style>
:root{
  --primary:#111;
  --accent:#007aff;
  --bg:#f5f5f7;
  --card:#fff;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}

body{background:var(--bg);color:#111;}

.navbar{
  display:flex;justify-content:space-between;
  padding:15px 30px;background:#fff;
  position:sticky;top:0;box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.logo{font-weight:bold;font-size:20px;}
.nav a{margin:0 10px;cursor:pointer;}

.container{padding:30px;}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.product{
  background:var(--card);
  padding:15px;border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,.05);
  transition:.3s;
}

.product:hover{transform:translateY(-5px);}

.product img{width:100%;border-radius:10px;}

button{
  width:100%;padding:10px;
  border:none;border-radius:8px;
  background:var(--accent);color:#fff;
  margin-top:10px;cursor:pointer;
}

/* CART */
.cart{
  position:fixed;right:-350px;top:0;
  width:320px;height:100%;
  background:#fff;padding:20px;
  box-shadow:-2px 0 10px rgba(0,0,0,.1);
  transition:.3s;
}
.cart.active{right:0;}

.cart-item{
  display:flex;justify-content:space-between;
  margin:10px 0;
}

/* ADMIN */
.admin{
  margin-top:40px;
  background:#fff;padding:20px;
  border-radius:10px;
}

input{
  width:100%;padding:10px;margin:8px 0;
  border:1px solid #ddd;border-radius:8px;
}

/* CHECKOUT */
.checkout{
  margin-top:20px;
}

footer{
  text-align:center;
  padding:20px;margin-top:30px;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">Luxelane BD</div>
  <div class="nav">
    <a onclick="toggleCart()">Cart (<span id="count">0</span>)</a>
  </div>
</div>

<div class="container">
  <h2>Our Collection</h2>
  <div class="products" id="products"></div>

  <!-- ADMIN PANEL -->
  <div class="admin">
    <h3>Add Product (Admin)</h3>
    <input id="name" placeholder="Product Name">
    <input id="price" placeholder="Price">
    <input id="img" placeholder="Image URL">
    <button onclick="addProduct()">Add Product</button>
  </div>
</div>

<!-- CART -->
<div class="cart" id="cart">
  <h3>Your Cart</h3>
  <div id="cartItems"></div>
  <h4>Total: ৳<span id="total">0</span></h4>

  <div class="checkout">
    <input id="custName" placeholder="Your Name">
    <input id="phone" placeholder="Phone">
    <input id="address" placeholder="Address">
    <button onclick="orderWhatsApp()">Order via WhatsApp</button>
  </div>
</div>

<footer>© Luxelane BD</footer>

<script>
let products=JSON.parse(localStorage.getItem("products"))||[
{name:"Panjabi",price:1500,img:"https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf"},
{name:"Hoodie",price:2000,img:"https://images.unsplash.com/photo-1520975922323-4506c66a7df2"},
{name:"Shirt",price:1200,img:"https://images.unsplash.com/photo-1521336575822-6da63fb45455"},
{name:"Jacket",price:2500,img:"https://images.unsplash.com/photo-1495107334309-fcf20504a5ab"},
{name:"T-Shirt",price:800,img:"https://images.unsplash.com/photo-1512436991641-6745cdb1723f"},
{name:"Blazer",price:3500,img:"https://images.unsplash.com/photo-1593032465175-481ac7f401a0"}
];

let cart=[];

function render(){
  let html="";
  products.forEach((p,i)=>{
    html+=`
    <div class="product">
      <img src="${p.img}">
      <h4>${p.name}</h4>
      <p>৳${p.price}</p>
      <button onclick="add(${i})">Add to Cart</button>
    </div>`;
  });
  document.getElementById("products").innerHTML=html;
}

function add(i){
  let item=cart.find(x=>x.i===i);
  if(item) item.qty++;
  else cart.push({i,qty:1});
  updateCart();
}

function updateCart(){
  let html="",total=0,count=0;

  cart.forEach((c,index)=>{
    let p=products[c.i];
    total+=p.price*c.qty;
    count+=c.qty;

    html+=`
    <div class="cart-item">
      ${p.name} x${c.qty}
      <span onclick="remove(${index})">❌</span>
    </div>`;
  });

  document.getElementById("cartItems").innerHTML=html;
  document.getElementById("total").innerText=total;
  document.getElementById("count").innerText=count;
}

function remove(i){
  cart.splice(i,1);
  updateCart();
}

function toggleCart(){
  document.getElementById("cart").classList.toggle("active");
}

/* ADMIN ADD PRODUCT */
function addProduct(){
  let name=document.getElementById("name").value;
  let price=document.getElementById("price").value;
  let img=document.getElementById("img").value;

  products.push({name,price:Number(price),img});
  localStorage.setItem("products",JSON.stringify(products));
  render();
}

/* WHATSAPP ORDER */
function orderWhatsApp(){
  let name=document.getElementById("custName").value;
  let phone=document.getElementById("phone").value;
  let address=document.getElementById("address").value;

  let msg="🛍️ *New Order - Luxelane BD*%0A";
  cart.forEach(c=>{
    let p=products[c.i];
    msg+=`${p.name} x${c.qty} - ৳${p.price*c.qty}%0A`;
  });

  msg+=`%0A👤 Name: ${name}%0A📞 Phone: ${phone}%0A📍 Address: ${address}`;

  window.open(`https://wa.me/8801837977346?text=${msg}`);
}

render();
</script>

</body>
</html>
