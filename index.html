<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxelane BD - Premium</title>

<style>
:root{
  --bg:#050505;
  --card:#0f0f0f;
  --neon:linear-gradient(45deg,#00f5ff,#7b61ff);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui;
}

body{
  background:var(--bg);
  color:white;
}

/* NAVBAR */
.navbar{
  position:fixed;
  width:100%;
  top:0;
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  backdrop-filter:blur(15px);
  background:rgba(0,0,0,0.6);
  z-index:1000;
}

.logo{
  font-size:20px;
  font-weight:bold;
  background:var(--neon);
  -webkit-background-clip:text;
  color:transparent;
}

.nav a{
  margin:0 10px;
  cursor:pointer;
}

.cart-icon{
  cursor:pointer;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:50px;
  background:var(--neon);
  -webkit-background-clip:text;
  color:transparent;
}

/* PRODUCTS */
.container{
  padding:100px 20px 40px;
}

.filters{
  text-align:center;
  margin-bottom:20px;
}

.filters button{
  margin:5px;
  padding:8px 15px;
  background:#111;
  border:none;
  color:white;
  cursor:pointer;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.product{
  background:var(--card);
  padding:15px;
  border-radius:15px;
  transition:.3s;
}

.product:hover{
  transform:translateY(-10px);
  box-shadow:0 0 20px #00f5ff33;
}

.product img{
  width:100%;
  border-radius:10px;
}

.product button{
  width:100%;
  padding:8px;
  margin-top:10px;
  background:var(--neon);
  border:none;
  cursor:pointer;
}

/* CART DRAWER */
.cart{
  position:fixed;
  right:-400px;
  top:0;
  width:350px;
  height:100%;
  background:#111;
  padding:20px;
  transition:.3s;
  z-index:999;
}

.cart.active{right:0;}

.cart-item{
  display:flex;
  justify-content:space-between;
  margin:10px 0;
}

/* CHECKOUT */
.checkout{
  display:none;
  padding:100px 20px;
}

input,textarea{
  width:100%;
  padding:10px;
  margin:10px 0;
  background:#222;
  border:none;
  color:white;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background:#000a;
}

.modal img{
  width:300px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  background:#000;
}

/* MOBILE */
@media(max-width:600px){
  .hero h1{font-size:30px;}
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">Luxelane BD</div>
  <div class="nav">
    <a onclick="scrollToSection()">Shop</a>
  </div>
  <div class="cart-icon" onclick="toggleCart()">🛒 <span id="count">0</span></div>
</div>

<div class="hero">
  <h1>Luxury Fashion Experience</h1>
</div>

<div class="container">
  <div class="filters">
    <button onclick="filter('all')">All</button>
    <button onclick="filter('new')">New</button>
    <button onclick="filter('popular')">Popular</button>
  </div>

  <div class="products" id="products"></div>
</div>

<!-- CART -->
<div class="cart" id="cart">
  <h2>Your Cart</h2>
  <div id="cartItems"></div>
  <h3>Total: ৳<span id="total">0</span></h3>
  <button onclick="showCheckout()">Checkout</button>
</div>

<!-- CHECKOUT -->
<div class="checkout" id="checkout">
  <h2>Checkout</h2>
  <input placeholder="Full Name" required>
  <input placeholder="Phone Number" required>
  <textarea placeholder="Address"></textarea>
  <button onclick="placeOrder()">Place Order</button>
</div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeModal()">
  <img id="modalImg">
</div>

<footer>© Luxelane BD Premium</footer>

<script>
let products=[
{id:1,name:"Panjabi",price:1500,img:"https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf",cat:"new"},
{id:2,name:"Hoodie",price:2000,img:"https://images.unsplash.com/photo-1520975922323-4506c66a7df2",cat:"popular"},
{id:3,name:"Shirt",price:1200,img:"https://images.unsplash.com/photo-1521336575822-6da63fb45455",cat:"new"},
{id:4,name:"Jacket",price:2500,img:"https://images.unsplash.com/photo-1495107334309-fcf20504a5ab",cat:"popular"},
{id:5,name:"T-Shirt",price:800,img:"https://images.unsplash.com/photo-1512436991641-6745cdb1723f",cat:"new"},
{id:6,name:"Blazer",price:3500,img:"https://images.unsplash.com/photo-1593032465175-481ac7f401a0",cat:"popular"}
];

let cart=JSON.parse(localStorage.getItem("cart"))||[];

function render(list=products){
  let html="";
  list.forEach(p=>{
    html+=`
    <div class="product">
      <img src="${p.img}" onclick="openModal('${p.img}')">
      <h3>${p.name}</h3>
      <p>৳${p.price}</p>
      <button onclick="add(${p.id})">Add</button>
    </div>`;
  });
  document.getElementById("products").innerHTML=html;
}

function filter(cat){
  if(cat==="all") render();
  else render(products.filter(p=>p.cat===cat));
}

function add(id){
  let item=cart.find(i=>i.id===id);
  if(item) item.qty++;
  else cart.push({...products.find(p=>p.id===id),qty:1});
  update();
}

function update(){
  let html="",total=0,count=0;
  cart.forEach((i,index)=>{
    total+=i.price*i.qty;
    count+=i.qty;
    html+=`
    <div class="cart-item">
      ${i.name} x${i.qty}
      <span onclick="remove(${index})">❌</span>
    </div>`;
  });
  document.getElementById("cartItems").innerHTML=html;
  document.getElementById("total").innerText=total;
  document.getElementById("count").innerText=count;
  localStorage.setItem("cart",JSON.stringify(cart));
}

function remove(i){
  cart.splice(i,1);
  update();
}

function toggleCart(){
  document.getElementById("cart").classList.toggle("active");
}

function showCheckout(){
  document.getElementById("checkout").style.display="block";
  window.scrollTo(0,document.body.scrollHeight);
}

function placeOrder(){
  alert("Order Placed Successfully!");
  cart=[];
  update();
}

function openModal(img){
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalImg").src=img;
}
function closeModal(){
  document.getElementById("modal").style.display="none";
}

function scrollToSection(){
  window.scrollTo({top:500,behavior:"smooth"});
}

render();
update();
</script>

</body>
</html>
