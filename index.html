<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxelane BD</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#111;
  --light:#f8f8f8;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{background:#fff;color:#111;}

/* NAVBAR */
.navbar{
  position:sticky;top:0;
  display:flex;justify-content:space-between;align-items:center;
  padding:15px 20px;
  backdrop-filter:blur(10px);
  background:rgba(255,255,255,0.8);
  box-shadow:0 2px 15px rgba(0,0,0,0.05);
  z-index:1000;
}

.menu-icon{cursor:pointer;font-size:22px;}
.logo{font-weight:600;}

.menu{
  position:absolute;top:60px;left:20px;
  background:#fff;border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  transform:scale(0);transition:.3s;
}
.menu.active{transform:scale(1);}
.menu div{padding:12px 20px;cursor:pointer;}
.menu div:hover{background:#f1f1f1;}

/* HERO */
.hero{
  text-align:center;padding:100px 20px;
}
.hero h1{
  font-size:40px;
}

/* PRODUCTS */
.container{padding:40px 20px;}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:25px;
}

.product{
  background:#fff;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 5px 20px rgba(0,0,0,0.05);
  transition:.3s;
}
.product:hover{
  transform:translateY(-8px);
}
.product img{
  width:100%;
  height:260px;
  object-fit:cover;
  transition:.4s;
}
.product:hover img{
  transform:scale(1.1);
}

.product-content{padding:15px;}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#111;
  color:#fff;
  cursor:pointer;
  transition:.3s;
}
button:hover{
  background:#333;
}

/* CART */
.section{display:none;padding:30px;}
.active{display:block;}

.cart-item{
  display:flex;justify-content:space-between;
  margin:10px 0;
}

.qty button{
  width:25px;height:25px;
}

/* INPUT */
input,textarea{
  width:100%;padding:10px;margin:10px 0;
  border-radius:8px;border:1px solid #ddd;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;bottom:20px;right:20px;
  background:#25D366;color:#fff;
  padding:15px;border-radius:50%;
  cursor:pointer;
}

/* REVEAL */
.reveal{
  opacity:0;
  transform:translateY(30px);
  transition:all .6s ease;
}
.reveal.show{
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<div class="navbar">
  <div class="menu-icon" onclick="toggleMenu()">⋮</div>
  <div class="logo">Luxelane BD</div>
  <div onclick="showPage('cart')">🛒 <span id="count">0</span></div>
</div>

<div class="menu" id="menu">
  <div onclick="showPage('home')">Home</div>
  <div onclick="showPage('shop')">Shop</div>
  <div onclick="showPage('admin')">Add Product</div>
</div>

<div id="home" class="active">
  <div class="hero reveal">
    <h1>Luxury Minimal Fashion</h1>
  </div>
</div>

<div id="shop" class="section">
  <div class="container">
    <div class="products" id="products"></div>
  </div>
</div>

<div id="cart" class="section">
  <h2>Your Cart</h2>
  <div id="cartItems"></div>
  <h3>Total: ৳<span id="total">0</span></h3>
  <button onclick="showPage('checkout')">Checkout</button>
</div>

<div id="checkout" class="section">
  <h2>Checkout</h2>
  <input id="name" placeholder="Name">
  <input id="phone" placeholder="Phone">
  <textarea id="address" placeholder="Address"></textarea>
  <button onclick="sendOrder()">Order via WhatsApp</button>
</div>

<!-- ADMIN -->
<div id="admin" class="section">
  <h2>Add Product</h2>
  <input id="pname" placeholder="Product Name">
  <input id="pprice" placeholder="Price">
  <input id="pimg" placeholder="Image URL">
  <button onclick="addProduct()">Add Product</button>
</div>

<div class="whatsapp" onclick="openWhatsApp()">💬</div>

<script>

let products=JSON.parse(localStorage.getItem("products"))||[
{id:1,name:"Panjabi",price:1500,img:"https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf"},
{id:2,name:"Shirt",price:1200,img:"https://images.unsplash.com/photo-1521336575822-6da63fb45455"},
{id:3,name:"Hoodie",price:2000,img:"https://images.unsplash.com/photo-1520975922323-4506c66a7df2"},
{id:4,name:"Jacket",price:2500,img:"https://images.unsplash.com/photo-1495107334309-fcf20504a5ab"},
{id:5,name:"T-Shirt",price:800,img:"https://images.unsplash.com/photo-1512436991641-6745cdb1723f"},
{id:6,name:"Blazer",price:3500,img:"https://images.unsplash.com/photo-1593032465175-481ac7f401a0"}
];

let cart=JSON.parse(localStorage.getItem("cart"))||[];

function render(){
  const container=document.getElementById("products");
  container.innerHTML=products.map(p=>`
  <div class="product reveal">
    <img src="${p.img}" loading="lazy">
    <div class="product-content">
      <h3>${p.name}</h3>
      <p>৳${p.price}</p>
      <button onclick="add(${p.id})">Add to Cart</button>
    </div>
  </div>`).join("");
}

function add(id){
  let item=cart.find(i=>i.id===id);
  if(item) item.qty++;
  else cart.push({...products.find(p=>p.id===id),qty:1});
  update();
}

function update(){
  let total=0,count=0;
  const html=cart.map((i,index)=>{
    total+=i.price*i.qty;
    count+=i.qty;
    return `
    <div class="cart-item">
      ${i.name} x${i.qty}
      <button onclick="remove(${index})">X</button>
    </div>`;
  }).join("");

  document.getElementById("cartItems").innerHTML=html;
  document.getElementById("total").innerText=total;
  document.getElementById("count").innerText=count;

  localStorage.setItem("cart",JSON.stringify(cart));
}

function remove(i){
  cart.splice(i,1);
  update();
}

function addProduct(){
  const name=document.getElementById("pname").value;
  const price=Number(document.getElementById("pprice").value);
  const img=document.getElementById("pimg").value;

  products.push({id:Date.now(),name,price,img});
  localStorage.setItem("products",JSON.stringify(products));
  render();
  alert("Product Added!");
}

function sendOrder(){
  const name=document.getElementById("name").value;
  const phone=document.getElementById("phone").value;
  const address=document.getElementById("address").value;

  let msg="🛒 *Luxelane BD Order*%0A";
  cart.forEach(i=>{
    msg+=`${i.name} x${i.qty} = ৳${i.price*i.qty}%0A`;
  });

  msg+=`%0ATotal: ৳${cart.reduce((a,b)=>a+b.price*b.qty,0)}%0A`;
  msg+=`Name: ${name}%0APhone: ${phone}%0AAddress: ${address}`;

  window.open(`https://wa.me/8801837977346?text=${msg}`);
}

function toggleMenu(){
  document.getElementById("menu").classList.toggle("active");
}

function showPage(p){
  document.querySelectorAll('.section,#home').forEach(s=>s.style.display="none");
  document.getElementById(p).style.display="block";
  toggleMenu();
}

function openWhatsApp(){
  window.open("https://wa.me/8801837977346");
}

/* SCROLL ANIMATION */
const observer=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting) e.target.classList.add("show");
  });
});
document.querySelectorAll('.reveal').forEach(el=>observer.observe(el));

render();
update();

</script>

</body>
</html>
